name: VSA Stock Monitor

on:
  schedule:
    # 設定定時觸發 (UTC時間)。台股 09:00 是 UTC 01:00
    # 下面設定為週一至週五，每 10 分鐘執行一次 (01:00 - 05:40 UTC)
    - cron: '*/10 1-5 * * 1-5'
  workflow_dispatch: # 允許手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 執行監控程式
        env:
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py